  <text x="80" y="68" font-family="'JetBrains Mono',monospace" font-size="20" letter-spacing="5" fill="#6B8299">PROJECT 03</text>
  <text x="80" y="660" font-family="'Space Grotesk','Arial',sans-serif" font-size="48" font-weight="700" fill="#E6EDF6">OSINT Analysis System</text>
