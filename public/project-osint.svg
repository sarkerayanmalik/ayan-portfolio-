      <stop stop-color="#060B14"/><stop offset="1" stop-color="#0A1626"/>
    </linearGradient>
    <radialGradient id="g3" cx="50%" cy="42%" r="55%">
      <stop stop-color="#4DA3FF" stop-opacity="0.16"/><stop offset="1" stop-color="#4DA3FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg3)"/>
  <rect width="1280" height="720" fill="url(#g3)"/>

  <!-- graph edges -->
