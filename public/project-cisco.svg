<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cisco Network Design — Packet Tracer">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060B14"/><stop offset="1" stop-color="#0A1626"/>
    </linearGradient>
    <radialGradient id="g2" cx="50%" cy="42%" r="55%">
      <stop stop-color="#4DA3FF" stop-opacity="0.16"/><stop offset="1" stop-color="#4DA3FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg2)"/>
  <rect width="1280" height="720" fill="url(#g2)"/>

  <!-- core router -->
  <circle cx="640" cy="250" r="34" fill="#0A1626" stroke="#D49A3A" stroke-width="3"/>
  <!-- switches -->
  <g stroke="#4DA3FF" stroke-width="2.6" fill="#0A1626">
    <rect x="360" y="400" width="120" height="56" rx="8"/>
    <rect x="580" y="400" width="120" height="56" rx="8"/>
    <rect x="800" y="400" width="120" height="56" rx="8"/>
  </g>
  <!-- trunk links -->
  <g stroke="#4DA3FF" stroke-width="2.4" stroke-opacity="0.85">
    <line x1="640" y1="284" x2="420" y2="400"/>
    <line x1="640" y1="284" x2="640" y2="400"/>
    <line x1="640" y1="284" x2="860" y2="400"/>
  </g>
  <!-- VLAN hosts -->
  <g stroke="#7CF5D0" stroke-width="2" stroke-opacity="0.7">
    <line x1="420" y1="456" x2="380" y2="540"/><line x1="420" y1="456" x2="460" y2="540"/>
    <line x1="640" y1="456" x2="600" y2="540"/><line x1="640" y1="456" x2="680" y2="540"/>
    <line x1="860" y1="456" x2="820" y2="540"/><line x1="860" y1="456" x2="900" y2="540"/>
  </g>
  <g fill="#7CF5D0">
    <circle cx="380" cy="548" r="6"/><circle cx="460" cy="548" r="6"/>
    <circle cx="600" cy="548" r="6"/><circle cx="680" cy="548" r="6"/>
    <circle cx="820" cy="548" r="6"/><circle cx="900" cy="548" r="6"/>
  </g>

  <rect x="80" y="80" width="48" height="3" fill="#D49A3A"/>
  <text x="80" y="68" font-family="'JetBrains Mono',monospace" font-size="20" letter-spacing="5" fill="#6B8299">PROJECT 02</text>
  <text x="80" y="660" font-family="'Space Grotesk','Arial',sans-serif" font-size="48" font-weight="700" fill="#E6EDF6">Cisco Network Design</text>
  <text x="82" y="695" font-family="'JetBrains Mono',monospace" font-size="18" letter-spacing="2" fill="#4DA3FF">Cisco IOS · VLANs · ACLs · Inter-VLAN Routing</text>
</svg>
